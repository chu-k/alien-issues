name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make alienalienalien better? Describe it below.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this solve, or what use case does it enable?
      placeholder: I find it hard to... / I wish I could...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature or change you'd like to see.
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Mockups / screenshots
      description: Any wireframes, sketches, or reference screenshots that illustrate the idea.
